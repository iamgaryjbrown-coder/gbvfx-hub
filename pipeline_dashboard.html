<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GBVFX — Delivery Pipeline</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #111;
  --surface: #1a1a1a;
  --card: #222;
  --card-hover: #282828;
  --border: #333;
  --text: #e0e0e0;
  --text-muted: #777;
  --text-dim: #555;
  --accent: #4a9eff;
  --green: #3ddc84;
  --green-bg: rgba(61,220,132,0.08);
  --green-border: rgba(61,220,132,0.25);
  --amber: #ffb74d;
  --amber-bg: rgba(255,183,77,0.08);
  --amber-border: rgba(255,183,77,0.25);
  --red: #ff5252;
  --red-bg: rgba(255,82,82,0.08);
  --red-border: rgba(255,82,82,0.25);
  --grey: #444;
  --grey-bg: rgba(68,68,68,0.15);
  --grey-border: rgba(68,68,68,0.4);
  --radius: 8px;
  --transition: 0.2s ease;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  line-height: 1.5;
  min-height: 100vh;
}

/* Header */
.top-bar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 16px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
}

.top-bar h1 {
  font-size: 18px;
  font-weight: 700;
  color: #fff;
  letter-spacing: 0.5px;
}

.top-bar h1 span { color: var(--accent); }

.top-bar .actions { display: flex; gap: 10px; }

.btn {
  padding: 8px 16px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--card);
  color: var(--text);
  font-size: 13px;
  font-family: inherit;
  cursor: pointer;
  transition: background var(--transition), border-color var(--transition);
  display: inline-flex;
  align-items: center;
  gap: 6px;
}

.btn:hover { background: var(--card-hover); border-color: #444; }
.btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
.btn-primary:hover { background: #5db0ff; }

/* Layout */
.main { padding: 24px; }

/* Legend */
.legend {
  display: flex;
  gap: 20px;
  margin-bottom: 24px;
  flex-wrap: wrap;
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: var(--text-muted);
}

.legend-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
}

.legend-dot.green { background: var(--green); }
.legend-dot.amber { background: var(--amber); }
.legend-dot.red { background: var(--red); }
.legend-dot.grey { background: var(--grey); }

/* Project cards */
.project-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 16px;
  overflow: hidden;
  transition: border-color var(--transition);
}

.project-card:hover { border-color: #444; }

.project-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px;
  cursor: pointer;
  user-select: none;
}

.project-header:hover { background: rgba(255,255,255,0.02); }

.project-info {
  display: flex;
  align-items: center;
  gap: 14px;
}

.project-code {
  font-size: 18px;
  font-weight: 700;
  color: #fff;
  min-width: 60px;
}

.project-name {
  font-size: 14px;
  color: var(--text-muted);
}

.project-summary {
  display: flex;
  align-items: center;
  gap: 6px;
}

.summary-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
}

.summary-dot.green { background: var(--green); }
.summary-dot.amber { background: var(--amber); }
.summary-dot.red { background: var(--red); }
.summary-dot.grey { background: var(--grey); }

.chevron {
  width: 18px;
  height: 18px;
  color: var(--text-muted);
  transition: transform var(--transition);
  margin-left: 12px;
}

.project-card.collapsed .chevron { transform: rotate(-90deg); }

/* Pipeline */
.project-body {
  border-top: 1px solid var(--border);
  padding: 20px;
  max-height: 2000px;
  overflow: hidden;
  transition: max-height 0.35s ease, padding 0.35s ease, opacity 0.25s ease;
  opacity: 1;
}

.project-card.collapsed .project-body {
  max-height: 0;
  padding: 0 20px;
  opacity: 0;
  border-top-color: transparent;
}

.pipeline {
  display: flex;
  gap: 0;
  align-items: stretch;
  overflow-x: auto;
  padding-bottom: 4px;
}

.stage {
  flex: 1;
  min-width: 140px;
  position: relative;
}

.stage-card {
  border-radius: var(--radius);
  padding: 14px 16px;
  min-height: 110px;
  cursor: pointer;
  transition: background var(--transition), border-color var(--transition);
  position: relative;
}

.stage-card.green {
  background: var(--green-bg);
  border: 1px solid var(--green-border);
}
.stage-card.green:hover { background: rgba(61,220,132,0.14); }

.stage-card.amber {
  background: var(--amber-bg);
  border: 1px solid var(--amber-border);
}
.stage-card.amber:hover { background: rgba(255,183,77,0.14); }

.stage-card.red {
  background: var(--red-bg);
  border: 1px solid var(--red-border);
}
.stage-card.red:hover { background: rgba(255,82,82,0.14); }

.stage-card.grey {
  background: var(--grey-bg);
  border: 1px solid var(--grey-border);
}
.stage-card.grey:hover { background: rgba(68,68,68,0.25); }

.stage-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
}

.stage-icon {
  width: 20px;
  height: 20px;
  flex-shrink: 0;
}

.stage-icon.green { color: var(--green); }
.stage-icon.amber { color: var(--amber); }
.stage-icon.red { color: var(--red); }
.stage-icon.grey { color: var(--grey); }

.stage-title {
  font-size: 13px;
  font-weight: 600;
  color: #fff;
}

.stage-detail {
  font-size: 11px;
  color: var(--text-muted);
  line-height: 1.5;
}

.stage-detail .info-line {
  display: flex;
  align-items: center;
  gap: 4px;
  margin-top: 2px;
}

.stage-detail .missing {
  color: var(--red);
  font-weight: 500;
}

.stage-detail .partial {
  color: var(--amber);
  font-weight: 500;
}

.stage-detail .ok {
  color: var(--green);
}

/* Arrow connector */
.stage-arrow {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 24px;
  flex-shrink: 0;
  color: var(--text-dim);
  font-size: 16px;
}

/* Detail panel (shown when clicking a stage) */
.stage-panel {
  display: none;
  margin-top: 16px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 20px;
}

.stage-panel.visible { display: block; }

.stage-panel h3 {
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 12px;
  color: #fff;
}

.panel-row {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  padding: 6px 0;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  font-size: 13px;
}

.panel-row:last-child { border-bottom: none; }

.panel-label { color: var(--text-muted); }

.panel-value { color: var(--text); font-weight: 500; }
.panel-value.set { color: var(--green); }
.panel-value.missing { color: var(--red); }
.panel-value.na { color: var(--text-dim); }

/* Toast */
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 10px 20px;
  border-radius: var(--radius);
  font-size: 13px;
  opacity: 0;
  transition: transform 0.3s ease, opacity 0.3s ease;
  z-index: 200;
}
.toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
.toast.success { border-color: var(--green); color: var(--green); }

/* Responsive */
@media (max-width: 768px) {
  .pipeline { flex-direction: column; }
  .stage-arrow { transform: rotate(90deg); width: auto; height: 24px; }
  .stage { min-width: 0; }
}
</style>
</head>
<body>

<div class="top-bar">
  <h1>GBVFX <span>Delivery Pipeline</span></h1>
  <div class="actions">
    <button class="btn" onclick="location.href='project_setup.html'">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      New Project
    </button>
    <button class="btn" onclick="loadConfig()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      Import Config
    </button>
  </div>
</div>

<div class="main">
  <div class="legend">
    <div class="legend-item"><div class="legend-dot green"></div> Fully automated</div>
    <div class="legend-item"><div class="legend-dot amber"></div> Partial — some info missing</div>
    <div class="legend-item"><div class="legend-dot red"></div> Blocked — critical info needed</div>
    <div class="legend-item"><div class="legend-dot grey"></div> Not configured</div>
  </div>

  <div id="projects"></div>
</div>

<input type="file" id="fileInput" accept=".json" style="display:none" onchange="handleFileImport(event)">
<div class="toast" id="toast"></div>

<script>
// ── Pipeline stage definitions ──
const STAGES = [
  {
    id: 'ingest',
    title: 'QT Ingest',
    icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>',
    requires: ['watch_folder', 'shotgrid_project_id', 'filename_pattern'],
    nice_to_have: ['resolution', 'fps', 'qt_bitrate'],
    labels: {
      watch_folder: 'Watch Folder',
      shotgrid_project_id: 'ShotGrid ID',
      filename_pattern: 'Filename Pattern',
      resolution: 'Resolution',
      fps: 'Frame Rate',
      qt_bitrate: 'QT Bit Rate'
    },
    description: 'Watch Dropbox folder → parse filename → upload to ShotGrid → create playlist'
  },
  {
    id: 'qt_delivery',
    title: 'QT Delivery',
    icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>',
    requires: ['csv_folder', 'email.to'],
    nice_to_have: ['qt_send_method', 'qt_bitrate', 'email.body_message'],
    labels: {
      csv_folder: 'CSV Folder',
      'email.to': 'QT Email Recipients',
      qt_send_method: 'QT Send Method',
      qt_bitrate: 'QT Bit Rate',
      'email.body_message': 'Email Body'
    },
    description: 'Copy to server → generate CSV → send notification email to editorial'
  },
  {
    id: 'exr_prep',
    title: 'EXR Prep',
    icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V9z"/><polyline points="13 2 13 9 20 9"/></svg>',
    requires: ['server_project', 'exr_source_folder', 'shotgrid_project_id'],
    nice_to_have: ['di_house.split_by_episode'],
    labels: {
      server_project: 'Server Project',
      exr_source_folder: 'EXR Source Folder',
      shotgrid_project_id: 'ShotGrid ID',
      'di_house.split_by_episode': 'Split by Episode'
    },
    description: 'Query ShotGrid for "Send EXR" → find EXR folders → create symlink delivery folder → CSV'
  },
  {
    id: 'exr_send',
    title: 'EXR Send',
    icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>',
    requires: ['di_house.name', 'di_house.exr_method'],
    nice_to_have: ['exr_send_automated'],
    labels: {
      'di_house.name': 'DI House',
      'di_house.exr_method': 'Send Method',
      'exr_send_automated': 'Automated Send'
    },
    description: 'MANUAL — log into DI house portal, select delivery folder, send. Automation requires S2P API ($5k/yr) or browser automation.'
  },
  {
    id: 'exr_confirm',
    title: 'EXR Confirm',
    icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>',
    requires: ['di_house.confirmation_type', 'email_exr.to'],
    nice_to_have: ['di_house.confirmation_sender', 'di_house.confirmation_subject_match', 'email_exr.body_message'],
    labels: {
      'di_house.confirmation_type': 'Confirmation Type',
      'email_exr.to': 'EXR Email Recipients',
      'di_house.confirmation_sender': 'Confirmation Sender',
      'di_house.confirmation_subject_match': 'Subject Match',
      'email_exr.body_message': 'Email Body'
    },
    description: 'Detect DI house confirmation → update ShotGrid → send notification email'
  },
  {
    id: 'ftrack',
    title: 'ftrack Sync',
    icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/></svg>',
    requires: ['ftrack_project'],
    nice_to_have: [],
    labels: {
      ftrack_project: 'ftrack Project'
    },
    description: 'Sync ShotGrid notes & annotations → ftrack for AB Studios'
  }
];

// ── Data ──
const STORAGE_KEY = 'gbvfx_pipeline_projects';

function loadProjects() {
  try {
    return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
  } catch { return []; }
}

function saveProjects(projects) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(projects));
}

// ── Resolve nested config value ──
function getVal(config, path) {
  const parts = path.split('.');
  let v = config;
  for (const p of parts) {
    if (v == null) return null;
    v = v[p];
  }
  if (v === '' || v === null || v === undefined) return null;
  if (Array.isArray(v) && v.length === 0) return null;
  return v;
}

// ── Evaluate stage status ──
function evaluateStage(stage, config) {
  const reqMissing = stage.requires.filter(r => getVal(config, r) === null);
  const niceHaveMissing = stage.nice_to_have.filter(r => getVal(config, r) === null);
  const totalRequired = stage.requires.length;
  const reqPresent = totalRequired - reqMissing.length;

  if (reqMissing.length === totalRequired && totalRequired > 0) {
    return { status: 'grey', reqMissing, niceHaveMissing, reqPresent, totalRequired };
  }
  if (reqMissing.length > 0) {
    return { status: 'red', reqMissing, niceHaveMissing, reqPresent, totalRequired };
  }
  if (niceHaveMissing.length > 0) {
    return { status: 'amber', reqMissing, niceHaveMissing, reqPresent, totalRequired };
  }
  return { status: 'green', reqMissing, niceHaveMissing, reqPresent, totalRequired };
}

// ── Render ──
let activePanel = null; // track which panel is open: 'projectCode-stageId'

function renderProjects() {
  const projects = loadProjects();
  const container = document.getElementById('projects');

  if (projects.length === 0) {
    container.innerHTML = `
      <div style="text-align:center; padding:60px 20px; color:var(--text-muted);">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="margin-bottom:16px; color:var(--text-dim);">
          <path d="M13 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V9z"/><polyline points="13 2 13 9 20 9"/>
        </svg>
        <div style="font-size:16px; margin-bottom:8px; color:var(--text);">No projects configured</div>
        <div style="font-size:13px; margin-bottom:20px;">Set up a new project or import an existing config</div>
        <button class="btn btn-primary" onclick="location.href='project_setup.html'">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          New Project
        </button>
      </div>`;
    return;
  }

  container.innerHTML = projects.map(config => {
    const code = config.project_code || '???';
    const name = config.project_name || '';
    const stageResults = STAGES.map(s => ({ stage: s, eval: evaluateStage(s, config) }));
    const summaryDots = stageResults.map(r =>
      `<div class="summary-dot ${r.eval.status}"></div>`
    ).join('');

    const pipelineHTML = stageResults.map((r, i) => {
      const s = r.stage;
      const e = r.eval;
      const panelKey = code + '-' + s.id;
      const isOpen = activePanel === panelKey;

      let detailHTML = '';
      if (e.status === 'green') {
        detailHTML = `<div class="info-line ok">All configured</div>`;
      } else if (e.status === 'grey') {
        detailHTML = `<div class="info-line" style="color:var(--text-dim)">Not started</div>`;
      } else if (e.status === 'red') {
        detailHTML = e.reqMissing.slice(0, 2).map(m =>
          `<div class="info-line missing">⚠ ${s.labels[m] || m}</div>`
        ).join('');
        if (e.reqMissing.length > 2) detailHTML += `<div class="info-line missing">+${e.reqMissing.length - 2} more</div>`;
      } else {
        detailHTML = e.niceHaveMissing.slice(0, 2).map(m =>
          `<div class="info-line partial">○ ${s.labels[m] || m}</div>`
        ).join('');
      }

      // Panel rows
      const allFields = [...s.requires, ...s.nice_to_have];
      const panelRows = allFields.map(f => {
        const val = getVal(config, f);
        const label = s.labels[f] || f;
        let valClass = 'missing';
        let display = 'Not set';
        if (val !== null) {
          valClass = 'set';
          if (Array.isArray(val)) display = val.join(', ');
          else if (typeof val === 'boolean') display = val ? 'Yes' : 'No';
          else display = String(val);
          if (display.length > 50) display = display.substring(0, 47) + '...';
        }
        const isRequired = s.requires.includes(f);
        return `<div class="panel-row">
          <span class="panel-label">${label}${isRequired ? ' *' : ''}</span>
          <span class="panel-value ${valClass}">${display}</span>
        </div>`;
      }).join('');

      const arrow = i < stageResults.length - 1
        ? '<div class="stage-arrow">→</div>' : '';

      return `<div class="stage">
        <div class="stage-card ${e.status}" onclick="togglePanel('${panelKey}')">
          <div class="stage-header">
            <div class="stage-icon ${e.status}">${s.icon}</div>
            <div class="stage-title">${s.title}</div>
          </div>
          <div class="stage-detail">${detailHTML}</div>
        </div>
      </div>${arrow}`;
    }).join('');

    // Find which panel is open for this project
    const openStage = stageResults.find(r => activePanel === code + '-' + r.stage.id);
    let panelHTML = '';
    if (openStage) {
      const s = openStage.stage;
      const allFields = [...s.requires, ...s.nice_to_have];
      const panelRows = allFields.map(f => {
        const val = getVal(config, f);
        const label = s.labels[f] || f;
        let valClass = 'missing';
        let display = 'Not set';
        if (val !== null) {
          valClass = 'set';
          if (Array.isArray(val)) display = val.join(', ');
          else if (typeof val === 'boolean') display = val ? 'Yes' : 'No';
          else display = String(val);
          if (display.length > 60) display = display.substring(0, 57) + '...';
        }
        const isRequired = s.requires.includes(f);
        return `<div class="panel-row">
          <span class="panel-label">${label}${isRequired ? ' *' : ''}</span>
          <span class="panel-value ${valClass}">${display}</span>
        </div>`;
      }).join('');

      panelHTML = `<div class="stage-panel visible">
        <h3>${s.title}</h3>
        <div style="font-size:12px; color:var(--text-muted); margin-bottom:12px;">${s.description}</div>
        ${panelRows}
      </div>`;
    }

    return `<div class="project-card" id="proj-${code}">
      <div class="project-header" onclick="toggleProject('proj-${code}')">
        <div class="project-info">
          <div class="project-code">${code}</div>
          <div class="project-name">${name}</div>
        </div>
        <div style="display:flex; align-items:center;">
          <div class="project-summary">${summaryDots}</div>
          <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
      </div>
      <div class="project-body">
        <div class="pipeline">${pipelineHTML}</div>
        ${panelHTML}
      </div>
    </div>`;
  }).join('');
}

function toggleProject(id) {
  document.getElementById(id).classList.toggle('collapsed');
}

function togglePanel(key) {
  activePanel = activePanel === key ? null : key;
  renderProjects();
}

// ── Import config ──
function loadConfig() {
  document.getElementById('fileInput').click();
}

function handleFileImport(event) {
  const file = event.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const config = JSON.parse(e.target.result);
      if (!config.project_code) {
        showToast('Invalid config: missing project_code', 'error');
        return;
      }

      const projects = loadProjects();
      const idx = projects.findIndex(p => p.project_code === config.project_code);
      if (idx >= 0) {
        projects[idx] = config;
      } else {
        projects.push(config);
      }
      saveProjects(projects);
      renderProjects();
      showToast('Imported: ' + config.project_code, 'success');
    } catch (err) {
      showToast('Invalid JSON file', 'error');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

// ── Toast ──
function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + (type || '') + ' show';
  setTimeout(() => t.classList.remove('show'), 3000);
}
